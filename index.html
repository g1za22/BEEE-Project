<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Logic Circuit Simulation</title>
    <style>
        :root {
            --bg-color: #12121a;
            --panel-bg: #1e1e28;
            --wire-off: #3f3f4e;
            --wire-on: #00e676; /* Bright Green */
            --gate-color: #8c8cba;
            --text-color: #ffffff;
            --danger: #ff4d4d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background-color: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            padding: 30px;
            width: 900px;
            display: flex;
            flex-direction: column;
            border: 1px solid #2a2a35;
        }

        h2 { text-align: center; margin-top: 0; font-weight: 400; letter-spacing: 1px; }

        .main-content {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        /* Controls Area */
        .controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .switch-box {
            background: #282836;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--wire-off);
            transition: all 0.3s;
        }
        
        .switch-box.active { border-left-color: var(--wire-on); }
        .switch-box.danger-active { border-left-color: var(--danger); }

        .switch-label { font-size: 0.9em; color: #aaa; margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 1px;}
        
        button {
            width: 100%;
            padding: 12px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            color: white;
            background: #444;
        }

        button.btn-on { background: var(--wire-on); box-shadow: 0 0 15px rgba(0, 230, 118, 0.4); color: #000; }
        button.btn-danger { background: var(--danger); box-shadow: 0 0 15px rgba(255, 77, 77, 0.4); }

        /* Circuit Area */
        .circuit-view {
            flex: 2;
            background: #171720;
            border-radius: 8px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px dashed #2a2a36;
        }

        svg {
            width: 100%;
            height: 350px;
            display: block;
        }

        /* SVG Styles */
        .wire { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.3s ease, filter 0.3s ease; }
        .gate { fill: none; stroke: var(--gate-color); stroke-width: 3; }
        .gate-fill { fill: #232332; stroke: var(--gate-color); stroke-width: 3; }
        .label { fill: #aaa; font-family: monospace; font-size: 14px; user-select: none; }
        .val-label { font-family: monospace; font-size: 16px; font-weight: bold; transition: fill 0.3s; }
        
        #lamp { transition: fill 0.3s, filter 0.3s; }
        
        .equation-bar {
            text-align: center;
            background: #12121a;
            padding: 15px;
            margin-top: 25px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 1.2em;
            color: var(--gate-color);
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Logic-Based Safety Interlock Simulator</h2>
    
    <div class="main-content">
        <div class="controls">
            <div class="switch-box" id="boxA">
                <span class="switch-label">Main Power (A)</span>
                <button id="btnA" onclick="toggle('A')">POWER OFF</button>
            </div>
            <div class="switch-box" id="boxB">
                <span class="switch-label">Safety Guard (B)</span>
                <button id="btnB" onclick="toggle('B')">DOOR OPEN</button>
            </div>
            <div class="switch-box danger-active" id="boxC">
                <span class="switch-label">Emergency Stop (C)</span>
                <button id="btnC" class="btn-danger" onclick="toggle('C')">E-STOP PRESSED</button>
            </div>
        </div>

        <div class="circuit-view">
            <svg viewBox="0 0 550 300">
                <path id="wireA" class="wire" d="M 40 70 L 320 70" stroke="#3f3f4e"/>
                <path id="wireB" class="wire" d="M 40 150 L 320 150" stroke="#3f3f4e"/>
                
                <path id="wireC1" class="wire" d="M 40 230 L 160 230" stroke="#3f3f4e"/>
                <path id="wireC2" class="wire" d="M 210 230 L 320 230" stroke="#3f3f4e"/>

                <path id="wireY" class="wire" d="M 420 150 L 480 150" stroke="#3f3f4e"/>

                <circle cx="40" cy="70" r="5" fill="#aaa" />
                <circle cx="40" cy="150" r="5" fill="#aaa" />
                <circle cx="40" cy="230" r="5" fill="#aaa" />
                
                <g transform="translate(160, 230)">
                    <polygon points="0,-15 0,15 40,0" class="gate-fill" />
                    <circle cx="45" cy="0" r="5" class="gate-fill" />
                    <text x="5" y="4" class="label" font-size="10">NOT</text>
                </g>

                <g transform="translate(320, 150)">
                    <path d="M 0,-100 L 0,100 C 60,100 100,60 100,0 C 100,-60 60,-100 0,-100 Z" class="gate-fill" />
                    <text x="35" y="5" class="label" font-size="14">AND</text>
                </g>

                <g transform="translate(480, 150)">
                    <circle cx="20" cy="0" r="20" id="lamp" fill="#3f3f4e" stroke="#8c8cba" stroke-width="3" />
                    <text x="55" y="5" class="label">MOTOR</text>
                </g>

                <text id="valA" x="50" y="60" class="val-label" fill="#aaa">0</text>
                <text id="valB" x="50" y="140" class="val-label" fill="#aaa">0</text>
                <text id="valC" x="50" y="220" class="val-label" fill="#aaa">1</text>
                <text id="valCnot" x="225" y="220" class="val-label" fill="#aaa">0</text>
                <text id="valY" x="435" y="140" class="val-label" fill="#aaa">0</text>

                <text x="20" y="75" class="label">A</text>
                <text x="20" y="155" class="label">B</text>
                <text x="20" y="235" class="label">C</text>
                <text x="250" y="220" class="label">C'</text>
                <text x="440" y="170" class="label">Y</text>
            </svg>
        </div>
    </div>
    
    <div class="equation-bar">
        System Logic: Y = A · B · C'
    </div>
</div>

<script>
    // Initial States: Safe State (Power Off, Door Open, E-Stop Pressed)
    let state = {
        A: false,
        B: false,
        C: true 
    };

    const colors = {
        off: '#3f3f4e',
        on: '#00e676',
        danger: '#ff4d4d',
        textOff: '#aaa',
        textOn: '#00e676'
    };

    function toggle(input) {
        state[input] = !state[input];
        updateSimulation();
    }

    function updateSimulation() {
        // Logic Calculations
        let notC = !state.C;
        let outY = state.A && state.B && notC;

        // 1. Update Buttons and UI Boxes
        const btnA = document.getElementById('btnA');
        const boxA = document.getElementById('boxA');
        btnA.innerText = state.A ? "POWER ON" : "POWER OFF";
        btnA.className = state.A ? "btn-on" : "";
        boxA.className = state.A ? "switch-box active" : "switch-box";

        const btnB = document.getElementById('btnB');
        const boxB = document.getElementById('boxB');
        btnB.innerText = state.B ? "DOOR CLOSED" : "DOOR OPEN";
        btnB.className = state.B ? "btn-on" : "";
        boxB.className = state.B ? "switch-box active" : "switch-box";

        const btnC = document.getElementById('btnC');
        const boxC = document.getElementById('boxC');
        btnC.innerText = state.C ? "E-STOP PRESSED" : "E-STOP RELEASED";
        btnC.className = state.C ? "btn-danger" : "";
        // If E-stop is pressed (1), it's dangerous, highlight red. If released (0), it's safe to run.
        boxC.className = state.C ? "switch-box danger-active" : "switch-box";

        // 2. Update SVG Wires (Color & Glow)
        function setWire(id, isOn, isDanger = false) {
            const wire = document.getElementById(id);
            let color = isOn ? (isDanger ? colors.danger : colors.on) : colors.off;
            wire.setAttribute('stroke', color);
            wire.style.filter = isOn ? `drop-shadow(0 0 5px ${color})` : 'none';
        }

        setWire('wireA', state.A);
        setWire('wireB', state.B);
        setWire('wireC1', state.C, true); // Red when pressed
        setWire('wireC2', notC);
        setWire('wireY', outY);

        // 3. Update 1/0 Labels on Wires
        function setLabel(id, val) {
            const el = document.getElementById(id);
            el.textContent = val ? "1" : "0";
            el.setAttribute('fill', val ? colors.textOn : colors.textOff);
        }

        setLabel('valA', state.A);
        setLabel('valB', state.B);
        setLabel('valC', state.C);
        setLabel('valCnot', notC);
        setLabel('valY', outY);

        // 4. Update Output Lamp
        const lamp = document.getElementById('lamp');
        if (outY) {
            lamp.setAttribute('fill', colors.on);
            lamp.style.filter = `drop-shadow(0 0 15px ${colors.on})`;
        } else {
            lamp.setAttribute('fill', colors.off);
            lamp.style.filter = 'none';
        }
    }

    // Initialize UI on load
    updateSimulation();
</script>

</body>
</html>
